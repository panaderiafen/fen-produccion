<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>fën — Sistema de producción</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

<!-- ── LOGIN ───────────────────────────────────── -->
<div id="login-screen">
  <div class="login-marca">
    <div class="login-logo">
      <img src="assets/logoprincipal.jpg" alt="fën" style="width:72px;height:72px;object-fit:contain;border-radius:18px" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
      <i class="ti ti-seed" style="display:none"></i>
    </div>
    <p>Sistema de producción · Recetas y costos</p>
  </div>
  <div class="login-grid" id="login-grid"></div>
</div>

<!-- ── APP ─────────────────────────────────────── -->
<div id="app" class="hidden">

  <!-- Topbar -->
  <header class="topbar">
    <div class="topbar-marca">
      <img src="assets/logosecundario.jpg" alt="fën" style="width:28px;height:28px;object-fit:contain;border-radius:6px" onerror="this.style.display='none'">
    </div>
    <div class="topbar-area">
      <i id="topbar-icon" class="ti ti-bread"></i>
      <span id="topbar-nombre">Área</span>
    </div>
    <div id="topbar-alerta" class="topbar-alerta hidden">
      <i class="ti ti-alert-circle"></i>
      <span>0 pendientes</span>
    </div>
    <div class="topbar-spacer"></div>
    <div class="topbar-usuario">
      <div class="topbar-avatar"><span id="topbar-avatar-txt">—</span></div>
      <span id="topbar-usuario-txt"></span>
    </div>
    <button class="btn-salir" onclick="salir()">
      <i class="ti ti-logout"></i> Salir
    </button>
  </header>

  <div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-nav" id="sidebar-nav"></div>
    </aside>

    <!-- Contenido -->
    <main class="content">

      <!-- Vista: vacía -->
      <div class="vista active" id="vista-empty">
        <div class="empty-state">
          <i class="ti ti-seed"></i>
          <h2>Bienvenido a fën</h2>
          <p>Selecciona una sección para comenzar</p>
        </div>
      </div>

      <!-- Vista: formulario receta -->
      <div class="vista" id="vista-form-receta"></div>

      <!-- Vista: mis recetas -->
      <div class="vista" id="vista-mis-recetas"></div>

      <!-- Vista: ver receta -->
      <div class="vista" id="vista-ver-receta"></div>

      <!-- Vista: planificación -->
      <div class="vista" id="vista-planificacion"></div>

      <!-- Vista: recetas del día -->
      <div class="vista" id="vista-recetas-dia"></div>

      <!-- Vista: maestro jefa -->
      <div class="vista" id="vista-maestro"></div>

      <!-- Vista: aprobaciones admin -->
      <div class="vista" id="vista-aprobaciones"></div>

      <!-- Vista: materias primas admin -->
      <div class="vista" id="vista-mp"></div>

      <!-- Vista: costos admin -->
      <div class="vista" id="vista-costos"></div>

      <!-- Vista: maestro admin -->
      <div class="vista" id="vista-maestro-admin"></div>

    </main>
  </div>
</div>

<!-- Loading overlay -->
<div id="loading-overlay" class="hidden" style="position:fixed;inset:0;background:rgba(255,243,233,.85);display:flex;align-items:center;justify-content:center;z-index:500;gap:12px;font-size:14px;color:#003a79">
  <div class="spinner" style="border-top-color:#003a79"></div>
  <span>Cargando...</span>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="js/config.js"></script>
<script src="js/app.js"></script>
</body>
</html>
